# Manages a single k3s-pod definition from network_nodes/network_pods.
# Called with _pod as loop variable: {key: pod_name, value: pod_definition}

- name: set pod facts
  set_fact:
    _pod_name: "{{_pod.key}}"
    _pod_namespace: "{{(_pod.value.k3s|default({})).namespace|default(_pod.key)}}"
    _pod_containers: "{{(_pod.value.pod|default({})).containers|default({})}}"
    _pod_networks: "{{_pod.value.network|default({})}}"
    _pod_labels: "{{(_pod.value.k3s|default({})).labels|default({})}}"
    _pod_volumes: "{{(_pod.value.pod|default({})).volumes|default([])}}"
    _pod_workload_type: "{{(_pod.value.k3s|default({})).workload_type|default('Deployment')}}"
    _pod_tolerations: "{{(_pod.value.pod|default({})).tolerations|default([])}}"
    _pod_node_selector: "{{(_pod.value.k3s|default({})).node_selector|default({})}}"
    _pod_configmaps: "{{(_pod.value.pod|default({})).configmaps|default([])}}"
    _pod_secrets: "{{(_pod.value.pod|default({})).secrets|default([])}}"
    _pod_init_containers: "{{(_pod.value.pod|default({})).initContainers|default([])}}"
    _pod_manifest: "{{(_pod.value.pod|default({})).manifest|default(false)}}"
    _pod_selector: "{{(_pod.value.k3s|default({})).selector|default({'app': _pod.key})}}"

- name: create namespace
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: present
    apply: yes
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{_pod_namespace}}"
        labels:
          configurator: ansible
        annotations:
          ansible.run-id: "{{ansible_run_id|default('N/A')}}"
          ansible.config_file: "{{ansible_config_file|default('N/A')}}"
          ansible.version: "{{ansible_version.full}}"
  when: _pod_namespace != 'default'

- name: create ConfigMaps for pod
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: present
    apply: yes
    definition: "{{lookup('template', 'pod-configmap.yml.j2')}}"
  register: _data_cm_results
  loop: "{{_pod_configmaps | rejectattr('authorized_keys', 'defined') | rejectattr('file', 'defined') | list}}"
  loop_control:
    loop_var: _configmap
    label: "{{_configmap.name}}"

- name: create authorized_keys ConfigMaps for pod
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: present
    apply: yes
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{_ak_cm.name}}"
        namespace: "{{_pod_namespace}}"
        labels:
          app: "{{_pod_name}}"
          configurator: ansible
        annotations:
          ansible.run-id: "{{ansible_run_id|default('N/A')}}"
          ansible.config_file: "{{ansible_config_file|default('N/A')}}"
          ansible.version: "{{ansible_version.full}}"
      data:
        authorized_keys: "{{lookup('template', 'pod-authorized-keys.j2')}}"
  register: _ak_cm_results
  loop: "{{_pod_configmaps | selectattr('authorized_keys', 'defined') | list}}"
  loop_control:
    loop_var: _ak_cm
    label: "{{_ak_cm.name}}"
  vars:
    _ak_use_management: "{{_ak_cm.authorized_keys.management | default(false)}}"
    _ak_key_names: "{{_ak_cm.authorized_keys.key_names | default([])}}"

- name: create file-backed ConfigMaps for pod
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: present
    apply: yes
    definition: "{{lookup('template', 'pod-configmap-file.yml.j2')}}"
  register: _file_cm_results
  loop: "{{_pod_configmaps | selectattr('file', 'defined') | list}}"
  loop_control:
    loop_var: _file_cm
    label: "{{_file_cm.name}}"

- name: create template-backed ConfigMaps for pod
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: present
    apply: yes
    definition: "{{lookup('template', 'pod-configmap-template.yml.j2')}}"
  register: _template_cm_results
  loop: "{{_pod_configmaps | selectattr('template', 'defined') | list}}"
  loop_control:
    loop_var: _template_cm
    label: "{{_template_cm.name}}"

- name: generate Secrets for pod
  include_tasks: generate_ssh_host_key_secret.yml
  loop: "{{_pod_secrets | selectattr('generate', 'defined') | list}}"
  loop_control:
    loop_var: _gen_secret
    label: "{{_gen_secret.name}}"

- name: create PersistentVolumeClaims for pod volumes
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: present
    definition: "{{lookup('template', 'pod-pvc.yml.j2')}}"
  loop: "{{_pod_volumes}}"
  loop_control:
    loop_var: _pvc
    label: "{{_pvc.name}}"
  when: _pvc.persistentVolumeClaim is defined

- name: push workload template for debug
  become: false
  connection: local
  local_action:
    module: ansible.builtin.template
    mode: 0600
    src: pod-deployment.yml.j2
    dest: "{{_k3s_debug_path}}/{{_pod_name}}-{{_pod_workload_type | lower}}.yaml"
  when: _k3s_debug_path is defined and not _pod_manifest

- name: push raw manifest for debug
  become: false
  connection: local
  copy:
    mode: 0600
    content: "{{_pod_manifest | to_nice_yaml}}"
    dest: "{{_k3s_debug_path}}/{{_pod_name}}-manifest.yaml"
  when: _k3s_debug_path is defined and _pod_manifest

- name: deploy workload from template
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: present
    apply: yes
    definition: "{{lookup('template', 'pod-deployment.yml.j2')}}"
  when: not _pod_manifest and _pod_containers | length > 0

- name: apply raw workload manifest
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: present
    apply: yes
    definition: "{{_pod_manifest}}"
  when: _pod_manifest

- name: warn if no containers or manifest defined
  debug:
    msg: "WARNING: pod {{_pod_name}} has neither pod.containers nor pod.manifest defined, skipping workload deployment"
  when: not _pod_manifest and _pod_containers | length == 0

# ConfigMaps mounted via subPath are not updated automatically in running pods.
# Patch the workload with a restart timestamp to trigger a rolling update whenever
# any such ConfigMap content changes (authorized_keys or inline data configmaps).
- name: rollout restart workload if subPath-mounted ConfigMap changed
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: patched
    kind: "{{_pod_workload_type}}"
    name: "{{_pod_name}}"
    namespace: "{{_pod_namespace}}"
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ansible_date_time.iso8601}}"
  when:
    - not _pod_manifest
    - _pod_containers | length > 0
    - (_ak_cm_results.changed | default(false)) or (_data_cm_results.changed | default(false)) or (_file_cm_results.changed | default(false)) or (_template_cm_results.changed | default(false))

# Clean up PVCs for volumes that were removed from config. This runs after the
# Deployment update so the rolling update has already removed the volumeMount
# from the pod spec.  The pvc-protection finalizer ensures K8s won't actually
# delete a PVC until all pods have released it, so there is no data-loss race.
- name: query ansible-managed PVCs for this pod
  kubernetes.core.k8s_info:
    kubeconfig: "{{_k3s_kubecfg}}"
    kind: PersistentVolumeClaim
    namespace: "{{_pod_namespace}}"
    label_selectors:
      - "app={{_pod_name}}"
      - "configurator=ansible"
  register: _existing_pod_pvcs

- name: build expected PVC names from current volume config
  set_fact:
    _expected_pvc_names: >-
      {{ _pod_volumes
         | selectattr('persistentVolumeClaim', 'defined')
         | map(attribute='persistentVolumeClaim.claimName')
         | list }}

- name: remove stale PersistentVolumeClaims
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: absent
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{item.metadata.name}}"
        namespace: "{{_pod_namespace}}"
  loop: "{{_existing_pod_pvcs.resources}}"
  loop_control:
    label: "{{item.metadata.name}}"
  when: item.metadata.name not in _expected_pvc_names

- name: query ansible-managed ConfigMaps for this pod
  kubernetes.core.k8s_info:
    kubeconfig: "{{_k3s_kubecfg}}"
    kind: ConfigMap
    namespace: "{{_pod_namespace}}"
    label_selectors:
      - "app={{_pod_name}}"
      - "configurator=ansible"
  register: _existing_pod_configmaps

- name: build expected ConfigMap names from current config
  set_fact:
    _expected_configmap_names: >-
      {{ _pod_configmaps | map(attribute='name') | list }}

- name: remove stale ConfigMaps
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: absent
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{item.metadata.name}}"
        namespace: "{{_pod_namespace}}"
  loop: "{{_existing_pod_configmaps.resources}}"
  loop_control:
    label: "{{item.metadata.name}}"
  when: item.metadata.name not in _expected_configmap_names

- name: query ansible-managed Secrets for this pod
  kubernetes.core.k8s_info:
    kubeconfig: "{{_k3s_kubecfg}}"
    kind: Secret
    namespace: "{{_pod_namespace}}"
    label_selectors:
      - "app={{_pod_name}}"
      - "configurator=ansible"
  register: _existing_pod_secrets

- name: build expected Secret names from current config
  set_fact:
    _expected_secret_names: >-
      {{ _pod_secrets | map(attribute='name') | list }}

- name: remove stale Secrets
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: absent
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{item.metadata.name}}"
        namespace: "{{_pod_namespace}}"
  loop: "{{_existing_pod_secrets.resources}}"
  loop_control:
    label: "{{item.metadata.name}}"
  when: item.metadata.name not in _expected_secret_names

# Query existing services before create/update to handle stale removal and
# format migrations (e.g. deprecated metallb annotations) in a single pass.
# Services are deleted unconditionally if stale, or if they carry a deprecated
# annotation that would conflict with the current spec format.
- name: query existing ansible-managed services for this pod
  kubernetes.core.k8s_info:
    kubeconfig: "{{_k3s_kubecfg}}"
    kind: Service
    namespace: "{{_pod_namespace}}"
    label_selectors:
      - "app={{_pod_name}}"
      - "configurator=ansible"
  register: _existing_pod_services

- name: build expected service names from current network config
  set_fact:
    _expected_service_names: >-
      {{ _pod_networks | dict2items
         | selectattr('value.addresses', 'defined')
         | map(attribute='key')
         | map('regex_replace', '^', _pod_name ~ '-')
         | list }}

# Delete services that are stale (removed from config) or that use the
# deprecated spec.loadBalancerIP field instead of the metallb annotation.
# Server-side apply handles port protocol conflicts (UDP+TCP on same port)
# correctly, but requires a clean slate when migrating from loadBalancerIP.
- name: remove stale or format-migrating LoadBalancer services
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: absent
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{item.metadata.name}}"
        namespace: "{{_pod_namespace}}"
  loop: "{{_existing_pod_services.resources}}"
  loop_control:
    label: "{{item.metadata.name}}"
  when: >
    item.metadata.name not in _expected_service_names or
    'metallb.universe.tf/loadBalancerIPs' not in (item.metadata.annotations | default({}))

# Create LoadBalancer services for each network interface that has an IP and ports configured.
# Port sources in order of precedence:
#   ports:  explicit list on the interface itself (use with pod.manifest)
#   links:  list of container names; ports collected from each (simple mode)
#   link:   single container name; ports collected from it (simple mode)
- name: deploy LoadBalancer service for external IP
  kubernetes.core.k8s:
    kubeconfig: "{{_k3s_kubecfg}}"
    state: present
    server_side_apply:
      field_manager: ansible
      force_conflicts: true
    definition: "{{lookup('template', 'pod-service.yml.j2')}}"
  with_dict: "{{_pod_networks}}"
  loop_control:
    loop_var: _network_iface
  when: >
    _network_iface.value.addresses is defined and
    _network_iface.value.addresses | length > 0 and
    (_network_iface.value.ports is defined or
     (_network_iface.value.link is defined and
      _network_iface.value.link in _pod_containers and
      (_pod_containers[_network_iface.value.link].ports | default([])) | length > 0) or
     (_network_iface.value.links is defined and
      _network_iface.value.links | length > 0))

- name: note interfaces without port configuration
  debug:
    msg: "Interface {{_network_iface.key}} on pod {{_pod_name}} has no port configuration in container {{_network_iface.value.link|default('(no link)')}}, skipping LoadBalancer service"
  with_dict: "{{_pod_networks}}"
  loop_control:
    loop_var: _network_iface
  when: >
    _network_iface.value.addresses is defined and
    _network_iface.value.addresses | length > 0 and
    _network_iface.value.ports is undefined and
    _network_iface.value.links is undefined and
    ((_network_iface.value.link is undefined) or
     (_network_iface.value.link not in _pod_containers) or
     ((_pod_containers[_network_iface.value.link].ports | default([])) | length == 0))
